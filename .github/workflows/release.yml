name: Build and Release BIGServers

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions: write-all

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Crear .env desde Secret
      shell: pwsh
      run: |
        # Agregamos tanto la URL de la DB como la clave de encriptación
        $envContent = @(
          "DATABASE_URL=${{ secrets.DATABASE_URL }}",
          "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}"
        )
        [System.IO.File]::WriteAllLines("$(Get-Location)\.env", $envContent)

    - name: Compilar EXE con Spec
      run: python -m PyInstaller --clean BIGServers.spec

    - name: Procesar Assets y Configuración
      id: release_info
      shell: pwsh
      run: |
        $jsonPath = "data/version.json"
        
        if (!(Test-Path $jsonPath)) { 
            Write-Host "Error: No se encontró version.json"
            throw "Falta archivo de configuración" 
        }
        
        $json = Get-Content $jsonPath | ConvertFrom-Json
        
        # Crear carpeta temporal para el empaquetado
        New-Item -ItemType Directory -Path "dist/zip_content/data"
        
        # Copiar ejecutable principal
        Copy-Item "dist/BIGServers.exe" "dist/zip_content/"
        
        # COPIAR TODO EL CONTENIDO DE DATA (Logo, Versión, etc.)
        # Esto asegura que el logo.ico esté presente para la App
        Copy-Item "data/*" "dist/zip_content/data/" -Recurse -Force
        
        # Generar el ZIP final
        Compress-Archive -Path "dist/zip_content/*" -DestinationPath "dist/BIGServers.zip"
        
        # Crear version.json independiente para el autoupdater
        $json | ConvertTo-Json -Depth 10 | Out-File -FilePath dist/version.json -Encoding utf8
        
        # Exportar variables para el paso de Release
        echo "TAG=$($json.action_config.tag)" >> $env:GITHUB_OUTPUT
        echo "TITLE=$($json.action_config.release_title)" >> $env:GITHUB_OUTPUT
        echo "DESC=$($json.action_config.release_description)" >> $env:GITHUB_OUTPUT
        echo "TARGET=$($json.action_config.target)" >> $env:GITHUB_OUTPUT
        
        if ($json.action_config.is_latest -eq $true) {
            echo "LATEST=true" >> $env:GITHUB_OUTPUT
            echo "PRERELEASE=false" >> $env:GITHUB_OUTPUT
        } else {
            echo "LATEST=false" >> $env:GITHUB_OUTPUT
            echo "PRERELEASE=true" >> $env:GITHUB_OUTPUT
        }

    - name: Publicar Release en GitHub
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.release_info.outputs.TAG }}
        name: ${{ steps.release_info.outputs.TITLE }}
        body: ${{ steps.release_info.outputs.DESC }}
        target_commitish: ${{ steps.release_info.outputs.TARGET }}
        make_latest: ${{ steps.release_info.outputs.LATEST }}
        prerelease: ${{ steps.release_info.outputs.PRERELEASE }}
        files: |
          dist/BIGServers.zip
          dist/version.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
